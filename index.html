<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทดสอบ OneSignal Root</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "c67167f2-e224-4efc-a843-aa94816e5220",
          notifyButton: {
            enable: true, // เปิดปุ่มกระดิ่งมุมขวาล่าง
          },
          allowLocalhostAsSecureOrigin: true
        });
      });
    </script>
</head>
<body>
    <h2>ระบบทดสอบแจ้งเตือน (Root Repository)</h2>
    <p>กรุณากดเปิดรับสิทธิ์การแจ้งเตือนที่ปุ่มกระดิ่งมุมขวาล่างครับ</p>
</body>
</html>
